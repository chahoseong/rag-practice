version: '3.8'
services:
  # 데이터베이스 서비스
  db:
    image: pgvector/pgvector:pg16-trixie
    container_name: pgvector-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgvector:/var/lib/postgresql/data